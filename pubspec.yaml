name: sincro_app_flutter
description: "A new Flutter project."
publish_to: 'none'
version: 1.14.0

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Pacote para localização do app (datas, etc.)
  flutter_localizations:
    sdk: flutter
  
  # Formatação de datas e números
  intl: ^0.20.2

  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8


  
  # Supabase (Self-Hosted)
  supabase_flutter: ^2.8.0


  reorderable_grid_view: ^2.2.8
  
  table_calendar: ^3.1.3
  collection: ^1.18.0

  flutter_staggered_grid_view: ^0.7.0

  rxdart: ^0.28.0



  equatable: ^2.0.5





  uuid: ^4.5.1

  # --- INÍCIO: DEPENDÊNCIAS PARA NOTIFICAÇÕES ---
  
  # Notificações locais
  flutter_local_notifications: ^17.2.3
  
  # Permissões do sistema
  permission_handler: ^11.3.1
  
  
  # Fuso horário
  timezone: ^0.9.4
  
  # Firebase Cloud Messaging
 
  
  # --- FIM: DEPENDÊNCIAS PARA NOTIFICAÇÕES ---

  # 🚀 ADICIONADO: Pacote para renderizar imagens SVG (o logo)
  flutter_svg: ^2.0.10+1

  # Renderização de Markdown nas mensagens do assistente
  flutter_markdown: ^0.7.7+1

  # Reconhecimento de voz multiplataforma (Android, iOS, Web, Windows)


  meta: any
  url_launcher: ^6.3.2
  flutter_stripe: ^11.5.0
  http: ^1.6.0
  flutter_stripe_web: ^6.5.1

  fl_chart: 0.69.0
  shared_preferences: ^2.5.3

  image_picker: ^1.1.2
  package_info_plus: ^9.0.0
  device_info_plus: 11.3.0

  postgrest: any
  
  # Leitura de arquivo .env
  flutter_dotenv: ^5.1.0
  font_awesome_flutter: ^10.12.0
  share_plus: ^12.0.1
  workmanager: ^0.9.0+3
  flutter_quill: ^11.5.0

  markdown: ^7.3.0

  flutter_animate: ^4.5.2
  animations: ^2.1.1
  window_manager: ^0.5.1
  firebase_auth: any
  local_notifier: ^0.1.6
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.2

  # 🚀 ADICIONADO: Pacote para gerar os ícones do app (Android/iOS)
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: fonts/Poppins-Bold.ttf
          weight: 700

# 🚀 ADICIONADO: Configuração do gerador de ícones
# Isso diz ao pacote para usar o seu "arquivo mestre"
# para criar todos os ícones necessários.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_app2.png"
  ios_remove_alpha: true # O iOS não permite transparência no ícone principal
  web:
    generate: true
    image_path: "assets/images/favicon_master_512.png"
    # Você pode adicionar mais configurações de favicon aqui se desejar
  windows:
    generate: true
    icon_size: 256 # Recommended for Windows
  macos:
    generate: true
  linux:
    generate: true